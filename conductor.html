<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL REMOTO CONDUCTOR - 100 MINEROS DIJERON</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #040916;
            color: #fff;
            padding: 1rem;
            font-family: 'Outfit', sans-serif;
        }
        .remote-header {
            background: #0d1b3e;
            border: 2px solid #3c6fe6;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        .remote-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #030712;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-top: 0.5rem;
        }
        .room-config-panel {
            margin-top: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .room-input {
            background: #040814;
            border: 1px solid #3c6fe6;
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            width: 100px;
            text-align: center;
            text-transform: uppercase;
        }
        .btn-room-save {
            background: #ffd800;
            color: #000;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .q-display {
            background: linear-gradient(135deg, #091738 0%, #15327c 100%);
            border: 2px solid #ffd800;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            text-align: center;
        }
        .q-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.35;
            margin-top: 0.5rem;
        }
        .remote-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.7rem;
            margin-bottom: 1.2rem;
        }
        .btn-remote {
            padding: 0.9rem;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.95rem;
            border: 1px solid #3c6fe6;
            background: #142a63;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-align: center;
        }
        .btn-remote:active { transform: scale(0.96); }
        
        /* Estilos Dinero Rápido */
        .fast-question-card {
            background: #0d1b3e;
            border: 2px solid #3c6fe6;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.2rem;
        }
        .fast-inputs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 0.8rem;
        }
        .player-col {
            background: rgba(4, 8, 20, 0.6);
            border: 1px solid #234eb6;
            border-radius: 12px;
            padding: 0.7rem;
        }
        .fast-btn-select {
            background: #15327c;
            border: 1px solid #3c6fe6;
            color: #fff;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            margin: 0.2rem;
            display: inline-block;
        }
        .fast-btn-select.selected {
            background: #ffd800;
            color: #000;
            border-color: #ffd800;
        }
    </style>
</head>
<body>

    <div class="remote-header">
        <h2 style="font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #ffd800; letter-spacing: 1px;">
            📱 CONTROL REMOTO CONDUCTOR
        </h2>
        <div class="remote-status" id="connectionStatus">
            <span>🟡</span> CONECTANDO A PANTALLA...
        </div>
        
        <div class="room-config-panel">
            <label for="roomCodeInput" style="font-size: 0.8rem; font-weight: 800; color: #ffd800;">SALA:</label>
            <input type="text" id="roomCodeInput" class="room-input" value="BACIS100">
            <button id="btnSaveRoomCode" class="btn-room-save">CONECTAR</button>
        </div>

        <div style="display:flex; justify-content:center; gap:0.6rem; margin-top:0.7rem;">
            <button id="btnTestSoundRemote" style="background:#ffd800; color:#000; border:none; border-radius:10px; padding:0.6rem 1rem; font-size:0.9rem; font-weight:900; cursor:pointer;">
                🔊 PROBAR SONIDO EN TV
            </button>
            <button id="btnToggleFastMoneyRemote" style="background:#be0b21; border:1px solid #ffd800; color:#fff; border-radius:10px; padding:0.6rem 1rem; font-size:0.9rem; font-weight:800; cursor:pointer;">
                🔥 DINERO RÁPIDO
            </button>
        </div>
    </div>

    <!-- ==========================================
       VISTA 1: JUEGO NORMAL DE TABLERO
       ========================================== -->
    <div id="normalGameRemoteView">
        <div class="q-display">
            <span id="remoteRoundBadge" style="background:#ffd800; color:#000; font-family:'Bebas Neue'; font-size:1.1rem; padding:0.2rem 0.8rem; border-radius:999px;">
                🎁 RONDA 1 DE 5
            </span>
            <div id="remoteQuestionText" class="q-text">Sincronizando pregunta...</div>
        </div>

        <div style="background:#0c1836; border:1px solid #234eb6; border-radius:14px; padding:1rem; margin-bottom:1.2rem; text-align:center;">
            <span style="font-size: 0.85rem; color: #9baad8; font-weight: 800; text-transform: uppercase;">
                🎮 EQUIPO QUE TIENE EL TURNO:
            </span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.7rem; margin-top:0.5rem;">
                <button id="btnTurnT1" style="padding:0.75rem; border-radius:10px; border:2px solid #234eb6; background:#0d1b3e; color:#fff; font-weight:800; cursor:pointer;">👷‍♂️ BARRETEROS</button>
                <button id="btnTurnT2" style="padding:0.75rem; border-radius:10px; border:2px solid #234eb6; background:#0d1b3e; color:#fff; font-weight:800; cursor:pointer;">💡 GAMBUSINOS</button>
            </div>
        </div>

        <div id="stealWarningPanel" style="display: none; background:#be0b21; color:#fff; border:2px solid #ff4e62; border-radius:12px; padding:0.8rem; text-align:center; font-weight:900; font-size:1rem; margin-bottom:1.2rem;">
            🚨 ¡3 STRIKES! OPORTUNIDAD DE ROBO
        </div>

        <div style="font-size: 0.85rem; color: #9baad8; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase;">
            👇 Toca una respuesta para destaparla en la televisión:
        </div>
        <div id="remoteAnswersGrid" class="answers-remote-grid"></div>

        <div class="remote-actions">
            <button id="remBtnStrike" class="btn-remote btn-strike-remote">
                ❌ MARCAR TACHE / ERROR (X)
            </button>
            <button id="remBtnPrev" class="btn-remote">
                ⬅️ ANTERIOR
            </button>
            <button id="remBtnNext" class="btn-remote" style="background:#1b3b8b; border-color:#ffd800;">
                SIGUIENTE ➡️
            </button>
            <button id="btnForceSync" class="btn-remote" style="background:#1b3b8b; border-color:#ffd800;">
                🔀 SALTAR PREGUNTA (OTRA)
            </button>
            <button id="remBtnTimer10" class="btn-remote">
                ⏱️ RELOJ 10s
            </button>
            <button id="remBtnTimer5" class="btn-remote">
                ⏱️ RELOJ 5s
            </button>
        </div>

        <div class="round-award-section">
            <div style="font-size:0.85rem; color:#9baad8; font-weight:800; margin-bottom:0.7rem; text-transform:uppercase;">
                🏆 Acreditar Ronda Ganada:
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.7rem;">
                <button id="remAwardT1" class="btn-remote" style="background:#ffd800; color:#000; font-weight:900;">
                    👷‍♂️ +1 RONDA BARRETEROS
                </button>
                <button id="remAwardT2" class="btn-remote" style="background:#ffd800; color:#000; font-weight:900;">
                    💡 +1 RONDA GAMBUSINOS
                </button>
            </div>
        </div>
    </div>

    <!-- ==========================================
       VISTA 2: CONTROLES DINERO RÁPIDO
       ========================================== -->
    <div id="fastMoneyRemoteView" style="display: none;">
        <div class="q-display" style="background: linear-gradient(135deg, #be0b21, #0d1b3e);">
            <div style="font-family:'Bebas Neue'; font-size:2rem; color:#ffd800;">🔥 MODO DINERO RÁPIDO</div>
            <div style="display:flex; justify-content:center; gap:0.5rem; margin-top:0.7rem;">
                <button id="btnFastTimer20" class="btn-remote" style="padding:0.4rem 0.8rem; font-size:0.8rem;">⏱️ RELOJ 20s</button>
                <button id="btnFastTimer25" class="btn-remote" style="padding:0.4rem 0.8rem; font-size:0.8rem;">⏱️ RELOJ 25s</button>
                <button id="btnFastTimerStop" class="btn-remote" style="background:#8f0d1b; border-color:#ff4e62; padding:0.4rem 0.8rem; font-size:0.8rem;">⏹️ PARAR</button>
            </div>
        </div>

        <!-- LISTA DE PREGUNTAS DINERO RÁPIDO -->
        <div id="fastQuestionsRemoteList">
            <!-- Autogenerado -->
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        let currentQuestion = MINING_QUESTIONS[0];
        let revealedIndexes = [];
        let roomCode = localStorage.getItem('bacis_room_code') || 'BACIS100';
        let eventSource = null;
        let activeTeam = null;
        let stealMode = false;
        
        // Estado Dinero Rápido local
        let fastMoneyMode = false;
        let fastQuestions = FAST_MONEY_QUESTIONS;
        let fastAnswers = { player1: ["","","","",""], player2: ["","","","",""] };
        let fastPoints = { player1: [0,0,0,0,0], player2: [0,0,0,0,0] };
        let fastRevealed = { player1: [false,false,false,false,false], player2: [false,false,false,false,false] };
        let fastPointsRevealed = { player1: [false,false,false,false,false], player2: [false,false,false,false,false] };

        document.getElementById('roomCodeInput').value = roomCode;

        function setConnectedUI() {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.classList.add('connected');
            statusEl.innerHTML = `<span>🟢</span> SALA: ${roomCode}`;
        }

        // ==========================================
        // 1. MOTOR LOCAL: BroadcastChannel
        // ==========================================
        const channel = new BroadcastChannel('bacis_game_channel');
        channel.onmessage = (event) => {
            if (event.data && event.data.type === 'SYNC_STATE') {
                applySyncState(event.data);
            }
        };

        // ==========================================
        // 2. MOTOR NUBE GLOBAL: SSE (ntfy.sh)
        // ==========================================
        function setupCloudSSE() {
            if (eventSource) {
                eventSource.close();
            }

            const topicState = `bacis_100mineros_state_${roomCode.toLowerCase()}`;
            eventSource = new EventSource(`https://ntfy.sh/${topicState}/sse`);
            
            eventSource.onopen = () => {
                setConnectedUI();
                sendRemoteCommand('REQUEST_SYNC');
            };

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.message) {
                        const state = JSON.parse(data.message);
                        if (state && state.type === 'SYNC_STATE') {
                            applySyncState(state);
                        }
                    }
                } catch(e) {}
            };
        }

        function applySyncState(data) {
            fastMoneyMode = data.fastMoneyMode || false;
            
            // Alternar vistas principales
            if (fastMoneyMode) {
                document.getElementById('normalGameRemoteView').style.display = 'none';
                document.getElementById('fastMoneyRemoteView').style.display = 'block';
                document.getElementById('btnToggleFastMoneyRemote').textContent = '📺 JUEGO NORMAL';
                
                // Actualizar datos de Dinero Rápido
                fastAnswers = data.fastAnswers || fastAnswers;
                fastPoints = data.fastPoints || fastPoints;
                fastRevealed = data.fastRevealed || fastRevealed;
                fastPointsRevealed = data.fastPointsRevealed || fastPointsRevealed;
                
                renderFastMoneyRemote();
            } else {
                document.getElementById('normalGameRemoteView').style.display = 'block';
                document.getElementById('fastMoneyRemoteView').style.display = 'none';
                document.getElementById('btnToggleFastMoneyRemote').textContent = '🔥 DINERO RÁPIDO';
                
                // Datos del juego normal
                currentQuestion = data.question;
                revealedIndexes = data.revealedIndexes || [];
                activeTeam = data.activeTeam;
                stealMode = data.stealMode;
                
                document.getElementById('remoteRoundBadge').textContent = `🎁 RONDA ${data.round || 1} DE 5`;
                
                // Selector de turnos
                document.getElementById('btnTurnT1').style.background = activeTeam === 'team1' ? '#ffd800' : '#0d1b3e';
                document.getElementById('btnTurnT1').style.color = activeTeam === 'team1' ? '#000' : '#fff';
                document.getElementById('btnTurnT2').style.background = activeTeam === 'team2' ? '#ffd800' : '#0d1b3e';
                document.getElementById('btnTurnT2').style.color = activeTeam === 'team2' ? '#000' : '#fff';

                const warningPanel = document.getElementById('stealWarningPanel');
                warningPanel.style.display = stealMode ? 'block' : 'none';

                renderRemoteScreen();
            }
        }

        function renderRemoteScreen() {
            if (!currentQuestion) return;
            document.getElementById('remoteQuestionText').textContent = currentQuestion.question;

            const grid = document.getElementById('remoteAnswersGrid');
            grid.innerHTML = '';

            currentQuestion.answers.forEach((ans, idx) => {
                const isRevealed = revealedIndexes.includes(idx);
                const card = document.createElement('div');
                card.className = `ans-remote-card ${isRevealed ? 'revealed' : ''}`;
                card.innerHTML = `
                    <div class="ans-remote-num">${idx + 1}</div>
                    <span class="ans-remote-text">${ans.text}</span>
                    <span class="ans-remote-pts">${ans.points}</span>
                `;

                card.addEventListener('click', () => {
                    sendRemoteCommand('REVEAL_CARD', { cardIndex: idx });
                    card.classList.add('revealed');
                });

                grid.appendChild(card);
            });
        }

        // ==========================================
        // RENDER DINERO RÁPIDO EN EL CELULAR
        // ==========================================
        function renderFastMoneyRemote() {
            const list = document.getElementById('fastQuestionsRemoteList');
            list.innerHTML = '';

            fastQuestions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'fast-question-card';
                
                // P1 info
                const p1Ans = fastAnswers.player1[idx];
                const p1Pts = fastPoints.player1[idx];
                const p1AnsRev = fastRevealed.player1[idx];
                const p1PtsRev = fastPointsRevealed.player1[idx];

                // P2 info
                const p2Ans = fastAnswers.player2[idx];
                const p2Pts = fastPoints.player2[idx];
                const p2AnsRev = fastRevealed.player2[idx];
                const p2PtsRev = fastPointsRevealed.player2[idx];

                let p1OptionsHTML = '';
                let p2OptionsHTML = '';

                // Crear botones para cada respuesta oficial
                q.answers.forEach(a => {
                    const isSelectedP1 = p1Ans === a.text;
                    const isSelectedP2 = p2Ans === a.text;
                    p1OptionsHTML += `<button class="fast-btn-select ${isSelectedP1 ? 'selected' : ''}" onclick="selectFastAnswer('player1', ${idx}, '${a.text}', ${a.points})">${a.text} (${a.points})</button>`;
                    p2OptionsHTML += `<button class="fast-btn-select ${isSelectedP2 ? 'selected' : ''}" onclick="selectFastAnswer('player2', ${idx}, '${a.text}', ${a.points})">${a.text} (${a.points})</button>`;
                });

                // Opción 0 Puntos
                p1OptionsHTML += `<button class="fast-btn-select ${p1Ans === 'OTRO / CERO' ? 'selected' : ''}" onclick="selectFastAnswer('player1', ${idx}, 'OTRO / CERO', 0)">OTRO (0)</button>`;
                p2OptionsHTML += `<button class="fast-btn-select ${p2Ans === 'OTRO / CERO' ? 'selected' : ''}" onclick="selectFastAnswer('player2', ${idx}, 'OTRO / CERO', 0)">OTRO (0)</button>`;

                card.innerHTML = `
                    <div style="font-weight:800; font-size:1.05rem; border-bottom:1px solid #3c6fe6; padding-bottom:0.4rem; color:#ffd800;">
                        Pregunta ${idx + 1}: ${q.question}
                    </div>
                    
                    <div class="fast-inputs-grid">
                        <!-- JUGADOR 1 -->
                        <div class="player-col">
                            <div style="font-weight:900; font-size:0.8rem; margin-bottom:0.4rem; color:#8ab4ff;">👷‍♂️ JUGADOR 1:</div>
                            <div style="margin-bottom:0.5rem;">${p1OptionsHTML}</div>
                            
                            <div style="display:flex; gap:0.4rem; margin-top:0.6rem;">
                                <button class="btn-room-save" style="background:${p1AnsRev ? '#234eb6' : '#ffd800'}; width:50%; font-size:0.75rem;" onclick="revealFastCell('player1', ${idx}, 'answer')">
                                    ${p1AnsRev ? '🟢 MOSTRADO' : '👁️ REVELAR R.'}
                                </button>
                                <button class="btn-room-save" style="background:${p1PtsRev ? '#234eb6' : '#ffd800'}; width:50%; font-size:0.75rem;" onclick="revealFastCell('player1', ${idx}, 'points')">
                                    ${p1PtsRev ? '🟢 MOSTRADO' : '👁️ REVELAR PTS'}
                                </button>
                            </div>
                        </div>

                        <!-- JUGADOR 2 -->
                        <div class="player-col">
                            <div style="font-weight:900; font-size:0.8rem; margin-bottom:0.4rem; color:#8ab4ff;">🔦 JUGADOR 2:</div>
                            <div style="margin-bottom:0.5rem;">${p2OptionsHTML}</div>
                            
                            <div style="display:flex; gap:0.4rem; margin-top:0.6rem;">
                                <button class="btn-room-save" style="background:${p2AnsRev ? '#234eb6' : '#ffd800'}; width:50%; font-size:0.75rem;" onclick="revealFastCell('player2', ${idx}, 'answer')">
                                    ${p2AnsRev ? '🟢 MOSTRADO' : '👁️ REVELAR R.'}
                                </button>
                                <button class="btn-room-save" style="background:${p2PtsRev ? '#234eb6' : '#ffd800'}; width:50%; font-size:0.75rem;" onclick="revealFastCell('player2', ${idx}, 'points')">
                                    ${p2PtsRev ? '🟢 MOSTRADO' : '👁️ REVELAR PTS'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Seleccionar respuesta de Dinero Rápido
        window.selectFastAnswer = function(playerKey, qIdx, answerText, pointsVal) {
            fastAnswers[playerKey][qIdx] = answerText;
            fastPoints[playerKey][qIdx] = pointsVal;
            
            // Sincronizar de inmediato con la televisión
            sendRemoteCommand('SET_FAST_DATA', {
                answers: fastAnswers,
                points: fastPoints
            });
            renderFastMoneyRemote();
        };

        // Revelar celda de Dinero Rápido
        window.revealFastCell = function(playerKey, qIdx, cellType) {
            sendRemoteCommand('REVEAL_FAST_CELL', {
                playerKey: playerKey,
                qIdx: qIdx,
                cellType: cellType
            });
        };

        function sendRemoteCommand(actionType, payload = {}) {
            const msg = { type: 'REMOTE_COMMAND', action: actionType, ...payload };
            channel.postMessage(msg);

            const topicCommands = `bacis_100mineros_cmd_${roomCode.toLowerCase()}`;
            fetch(`https://ntfy.sh/${topicCommands}`, {
                method: 'POST',
                body: JSON.stringify(msg)
            }).catch(() => {});
        }

        document.getElementById('btnSaveRoomCode').addEventListener('click', () => {
            const val = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (val !== '') {
                roomCode = val;
                localStorage.setItem('bacis_room_code', roomCode);
                setupCloudSSE();
                alert(`Conectado a la sala: ${roomCode}`);
            }
        });

        // Alternar Dinero Rápido
        document.getElementById('btnToggleFastMoneyRemote').addEventListener('click', () => {
            sendRemoteCommand('TOGGLE_FAST_MONEY');
        });

        // Controles de turno
        document.getElementById('btnTurnT1').addEventListener('click', () => sendRemoteCommand('SET_ACTIVE_TEAM', { team: 'team1' }));
        document.getElementById('btnTurnT2').addEventListener('click', () => sendRemoteCommand('SET_ACTIVE_TEAM', { team: 'team2' }));

        // Controles de tiempo Dinero Rápido
        document.getElementById('btnFastTimer20').addEventListener('click', () => sendRemoteCommand('START_FAST_TIMER', { seconds: 20 }));
        document.getElementById('btnFastTimer25').addEventListener('click', () => sendRemoteCommand('START_FAST_TIMER', { seconds: 25 }));
        document.getElementById('btnFastTimerStop').addEventListener('click', () => sendRemoteCommand('STOP_FAST_TIMER'));

        document.getElementById('btnTestSoundRemote').addEventListener('click', () => sendRemoteCommand('TEST_SOUND'));
        document.getElementById('btnForceSync').addEventListener('click', () => sendRemoteCommand('SKIP_QUESTION'));
        document.getElementById('remBtnStrike').addEventListener('click', () => sendRemoteCommand('TRIGGER_STRIKE'));
        document.getElementById('remBtnPrev').addEventListener('click', () => sendRemoteCommand('PREV_QUESTION'));
        document.getElementById('remBtnNext').addEventListener('click', () => sendRemoteCommand('NEXT_QUESTION'));
        document.getElementById('remBtnTimer10').addEventListener('click', () => sendRemoteCommand('START_TIMER', { seconds: 10 }));
        document.getElementById('remBtnTimer5').addEventListener('click', () => sendRemoteCommand('START_TIMER', { seconds: 5 }));
        document.getElementById('remAwardT1').addEventListener('click', () => sendRemoteCommand('AWARD_ROUND_T1'));
        document.getElementById('remAwardT2').addEventListener('click', () => sendRemoteCommand('AWARD_ROUND_T2'));

        setupCloudSSE();
        renderRemoteScreen();
    </script>
</body>
</html>
